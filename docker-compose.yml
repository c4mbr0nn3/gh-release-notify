services:
  gh-release-notify:
    image: gh-release-notify:latest
    build: .
    container_name: gh-release-notify
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.50"
    networks:
      - gh-release-notify-net
    volumes:
      - ./config.toml:/config/config.toml:ro
      - ./state:/state
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - CONFIG_PATH=/config/config.toml
      - RUST_LOG=info

networks:
  gh-release-notify-net:
    name: gh-release-notify-net