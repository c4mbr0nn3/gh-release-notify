# Manually-triggered release workflow (atomic).
# Run from Actions UI: Actions → release → Run workflow → choose level.
# Verifies (fmt/clippy/test), bumps Cargo.toml/Cargo.lock via cargo-release,
# commits, tags v{version}, pushes, then builds and pushes a multi-arch
# (amd64 + arm64) Docker image to GHCR, then creates a GitHub Release.
name: release

on:
  workflow_dispatch:
    inputs:
      level:
        description: "SemVer bump level"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Cache cargo-install bin dir
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-cargo-release-1

      - name: Install cargo-release
        run: cargo install cargo-release --version '^1' --locked

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run cargo-release
        id: cargo_release
        run: |
          cargo release --config release.toml --execute --no-confirm ${{ inputs.level }}

      - name: Extract version from pushed tag
        if: steps.cargo_release.outcome == 'success'
        id: version
        run: |
          git fetch --tags --force
          version_tag="$(git describe --tags --exact-match HEAD)"
          echo "tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "version=${version_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.cargo_release.outcome == 'success'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.cargo_release.outcome == 'success'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.cargo_release.outcome == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        if: steps.cargo_release.outcome == 'success'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/c4mbr0nn3/gh-release-notify
          flavors: |
            latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        if: steps.cargo_release.outcome == 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: steps.cargo_release.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true